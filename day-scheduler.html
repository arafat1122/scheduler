<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day Scheduler</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --ink: #202124;
      --muted: #6d6a61;
      --line: #ded8cb;
      --panel: #fffdf7;
      --accent: #126b63;
      --accent-dark: #0b4d47;
      --danger: #ad2f2f;
      --done: #40633b;
      --shadow: 0 16px 44px rgba(40, 34, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(18, 107, 99, 0.1), transparent 42%),
        var(--bg);
      color: var(--ink);
      font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .date {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .clock {
      min-width: 150px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.75);
      text-align: right;
      box-shadow: var(--shadow);
    }

    .clock strong {
      display: block;
      font-size: 1.6rem;
    }

    .clock span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.1rem;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(18, 107, 99, 0.16);
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 650;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .ghost {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .ghost:hover {
      background: #f2eee4;
    }

    .danger {
      background: var(--danger);
    }

    .danger:hover {
      background: #842525;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #edf6f3;
      color: #184d47;
      font-size: 0.92rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
    }

    .toolbar .actions {
      margin: 0;
    }

    .list {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .task {
      display: grid;
      grid-template-columns: 82px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .task.due {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(18, 107, 99, 0.12);
    }

    .task.done {
      opacity: 0.64;
    }

    .task-time {
      color: var(--accent-dark);
      font-size: 1.1rem;
      font-weight: 800;
      text-align: center;
    }

    .task-title {
      margin: 0 0 4px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .task-notes {
      margin: 0;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .task-buttons {
      display: flex;
      gap: 8px;
    }

    .icon-button {
      width: 42px;
      padding: 0;
      display: grid;
      place-items: center;
    }

    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .alarm {
      position: fixed;
      inset: auto 16px 16px 16px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 720px;
      margin: 0 auto;
      border: 1px solid rgba(18, 107, 99, 0.28);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
    }

    .alarm.show {
      display: flex;
    }

    .alarm p {
      margin: 0;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 24px, 640px);
        padding-top: 20px;
      }

      header,
      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .clock {
        text-align: left;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .task {
        grid-template-columns: 1fr;
      }

      .task-time {
        text-align: left;
      }

      .task-buttons {
        width: 100%;
      }

      .task-buttons button {
        flex: 1;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Day Scheduler</h1>
        <p class="date" id="todayLabel"></p>
      </div>
      <div class="clock" aria-live="polite">
        <strong id="clock">--:--</strong>
        <span>Asia/Dhaka time</span>
      </div>
    </header>

    <div class="layout">
      <section class="panel" aria-labelledby="planHeading">
        <h2 id="planHeading">Add a task</h2>
        <form id="taskForm">
          <label>
            Task
            <input id="taskTitle" autocomplete="off" placeholder="Study math, meeting, workout" required>
          </label>
          <div class="row">
            <label>
              Time
              <input id="taskTime" type="time" required>
            </label>
            <label>
              Ring
              <select id="taskRing">
                <option value="gentle">Gentle</option>
                <option value="bright">Bright</option>
                <option value="urgent">Urgent</option>
              </select>
            </label>
          </div>
          <label>
            Notes
            <textarea id="taskNotes" placeholder="Optional details"></textarea>
          </label>
          <div class="actions">
            <button type="submit">Add task</button>
            <button type="button" class="ghost" id="enableNotifications">Enable notifications</button>
            <button type="button" class="ghost" id="testAlarm">Test ring</button>
          </div>
        </form>
        <div class="status" id="notificationStatus"></div>
      </section>

      <section aria-labelledby="scheduleHeading">
        <div class="toolbar">
          <h2 id="scheduleHeading">Today’s plan</h2>
          <div class="actions">
            <button type="button" class="ghost" id="resetDone">Reset done</button>
            <button type="button" class="danger" id="clearPlan">Clear plan</button>
          </div>
        </div>
        <div class="list" id="taskList"></div>
      </section>
    </div>
  </main>

  <div class="alarm" id="alarmBanner" role="alert" aria-live="assertive">
    <div>
      <strong id="alarmTitle">Task time</strong>
      <p id="alarmNotes"></p>
    </div>
    <div class="actions">
      <button type="button" id="snoozeAlarm" class="ghost">Snooze 5 min</button>
      <button type="button" id="stopAlarm">Stop</button>
    </div>
  </div>

  <script>
    const storageKey = "day-scheduler-tasks-v1";
    const notifiedKey = "day-scheduler-notified-v1";
    const taskForm = document.querySelector("#taskForm");
    const taskList = document.querySelector("#taskList");
    const taskTitle = document.querySelector("#taskTitle");
    const taskTime = document.querySelector("#taskTime");
    const taskNotes = document.querySelector("#taskNotes");
    const taskRing = document.querySelector("#taskRing");
    const clock = document.querySelector("#clock");
    const todayLabel = document.querySelector("#todayLabel");
    const notificationStatus = document.querySelector("#notificationStatus");
    const alarmBanner = document.querySelector("#alarmBanner");
    const alarmTitle = document.querySelector("#alarmTitle");
    const alarmNotes = document.querySelector("#alarmNotes");

    let tasks = load(storageKey, []);
    let notified = load(notifiedKey, {});
    let audioContext;
    let ringingInterval;
    let activeAlarmId;

    function load(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
      localStorage.setItem(notifiedKey, JSON.stringify(notified));
    }

    function todayId() {
      return new Date().toLocaleDateString("en-CA");
    }

    function formatDate() {
      return new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(new Date());
    }

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
      todayLabel.textContent = formatDate();
    }

    function updateNotificationStatus() {
      if (!("Notification" in window)) {
        notificationStatus.textContent = "Browser notifications are not supported here. Keep this page open for the ring.";
        return;
      }

      if (Notification.permission === "granted") {
        notificationStatus.textContent = "Notifications are on. Keep this tab open so alarms can ring on time.";
      } else if (Notification.permission === "denied") {
        notificationStatus.textContent = "Notifications are blocked. Allow them in browser settings, or keep this page visible for rings.";
      } else {
        notificationStatus.textContent = "Enable notifications, then keep this page open while your day plan runs.";
      }
    }

    function normalizeTask(task) {
      return {
        id: task.id || crypto.randomUUID(),
        title: task.title.trim(),
        time: task.time,
        notes: task.notes.trim(),
        ring: task.ring,
        done: Boolean(task.done),
        date: task.date || todayId()
      };
    }

    function renderTasks() {
      const today = todayId();
      const todayTasks = tasks
        .filter(task => task.date === today)
        .sort((a, b) => a.time.localeCompare(b.time));

      if (todayTasks.length === 0) {
        taskList.innerHTML = '<div class="empty">No tasks yet. Add your first plan item and I’ll watch the clock.</div>';
        return;
      }

      taskList.innerHTML = "";
      for (const task of todayTasks) {
        const row = document.createElement("article");
        row.className = `task${task.done ? " done" : ""}${isDue(task) ? " due" : ""}`;
        row.innerHTML = `
          <div class="task-time">${escapeHtml(task.time)}</div>
          <div>
            <p class="task-title">${escapeHtml(task.title)}</p>
            <p class="task-notes">${escapeHtml(task.notes || "No notes")}</p>
          </div>
          <div class="task-buttons">
            <button class="ghost icon-button" title="Mark done" data-action="done" data-id="${task.id}">✓</button>
            <button class="ghost icon-button" title="Ring now" data-action="ring" data-id="${task.id}">▶</button>
            <button class="ghost icon-button" title="Delete" data-action="delete" data-id="${task.id}">×</button>
          </div>
        `;
        taskList.appendChild(row);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isDue(task) {
      const now = new Date();
      const current = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
      return task.date === todayId() && task.time <= current && !task.done;
    }

    async function requestNotifications() {
      if (!("Notification" in window)) {
        updateNotificationStatus();
        return;
      }
      await Notification.requestPermission();
      updateNotificationStatus();
    }

    function notify(task) {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(task.title, {
          body: task.notes || `Scheduled for ${task.time}`,
          tag: task.id,
          requireInteraction: true
        });
      }
    }

    function ring(task) {
      activeAlarmId = task.id;
      alarmTitle.textContent = `${task.time} - ${task.title}`;
      alarmNotes.textContent = task.notes || "It is time to do this task.";
      alarmBanner.classList.add("show");
      startSound(task.ring);
    }

    function startSound(style = "gentle") {
      stopSound();
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      const patterns = {
        gentle: [660, 880],
        bright: [880, 1174],
        urgent: [988, 740, 988]
      };
      const notes = patterns[style] || patterns.gentle;
      let index = 0;

      const playTone = () => {
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.frequency.value = notes[index % notes.length];
        oscillator.type = "sine";
        gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.18, audioContext.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.45);
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.5);
        index += 1;
      };

      playTone();
      ringingInterval = setInterval(playTone, style === "urgent" ? 620 : 900);
    }

    function stopSound() {
      if (ringingInterval) {
        clearInterval(ringingInterval);
        ringingInterval = null;
      }
    }

    function checkDueTasks() {
      const today = todayId();
      const now = new Date();
      const current = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;

      for (const task of tasks) {
        const key = `${today}:${task.id}:${task.time}`;
        if (task.date === today && task.time === current && !task.done && !notified[key]) {
          notified[key] = true;
          notify(task);
          ring(task);
        }
      }
      save();
      renderTasks();
    }

    taskForm.addEventListener("submit", event => {
      event.preventDefault();
      tasks.push(normalizeTask({
        title: taskTitle.value,
        time: taskTime.value,
        notes: taskNotes.value,
        ring: taskRing.value,
        date: todayId()
      }));
      taskForm.reset();
      taskRing.value = "gentle";
      save();
      renderTasks();
      taskTitle.focus();
    });

    taskList.addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const task = tasks.find(item => item.id === button.dataset.id);
      if (!task) return;

      if (button.dataset.action === "done") {
        task.done = !task.done;
        if (task.id === activeAlarmId) {
          stopSound();
          alarmBanner.classList.remove("show");
        }
      }

      if (button.dataset.action === "ring") {
        notify(task);
        ring(task);
      }

      if (button.dataset.action === "delete") {
        tasks = tasks.filter(item => item.id !== task.id);
        if (task.id === activeAlarmId) {
          stopSound();
          alarmBanner.classList.remove("show");
        }
      }

      save();
      renderTasks();
    });

    document.querySelector("#enableNotifications").addEventListener("click", requestNotifications);
    document.querySelector("#testAlarm").addEventListener("click", () => {
      ring({
        id: "test",
        title: "Test alarm",
        time: clock.textContent,
        notes: "Your scheduler ring is working.",
        ring: taskRing.value
      });
    });

    document.querySelector("#stopAlarm").addEventListener("click", () => {
      stopSound();
      alarmBanner.classList.remove("show");
    });

    document.querySelector("#snoozeAlarm").addEventListener("click", () => {
      const task = tasks.find(item => item.id === activeAlarmId);
      if (!task) return;
      const next = new Date(Date.now() + 5 * 60 * 1000);
      task.time = `${String(next.getHours()).padStart(2, "0")}:${String(next.getMinutes()).padStart(2, "0")}`;
      stopSound();
      alarmBanner.classList.remove("show");
      save();
      renderTasks();
    });

    document.querySelector("#resetDone").addEventListener("click", () => {
      for (const task of tasks) {
        if (task.date === todayId()) task.done = false;
      }
      save();
      renderTasks();
    });

    document.querySelector("#clearPlan").addEventListener("click", () => {
      if (!confirm("Clear today’s plan?")) return;
      const today = todayId();
      tasks = tasks.filter(task => task.date !== today);
      stopSound();
      alarmBanner.classList.remove("show");
      save();
      renderTasks();
    });

    updateClock();
    updateNotificationStatus();
    renderTasks();
    setInterval(updateClock, 1000);
    setInterval(checkDueTasks, 1000);
  </script>
</body>
</html>
