<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day Scheduler</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --ink: #202124;
      --muted: #6d6a61;
      --line: #ded8cb;
      --panel: #fffdf7;
      --accent: #126b63;
      --accent-dark: #0b4d47;
      --danger: #ad2f2f;
      --done: #40633b;
      --shadow: 0 16px 44px rgba(40, 34, 22, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(18, 107, 99, 0.1), transparent 42%),
        var(--bg);
      color: var(--ink);
      font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .date {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .clock {
      min-width: 150px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 247, 0.75);
      text-align: right;
      box-shadow: var(--shadow);
    }

    .clock strong {
      display: block;
      font-size: 1.6rem;
    }

    .clock span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
    }
